# Основная конфигурация BlueMap
webserver {
  port = 8100
  address = "0.0.0.0"
  webroot = "/app/web"
  max-connections = 100
}

# Добавьте эту секцию для автоматической загрузки ресурсов
webapp {
  # Разрешить автоматическую загрузку недостающих ресурсов
  download-resources = true
  # Путь к ресурсам (по умолчанию)
  resource-path = "/app/web"
}

database {
  type = "sql"
  sql {
    driver = "org.postgresql.Driver"
    url = "jdbc:postgresql://${BLUEMAP_DB_HOST}:${BLUEMAP_DB_PORT}/${BLUEMAP_DB_NAME}"
    username = "${BLUEMAP_DB_USER}"
    password = "${BLUEMAP_DB_PASSWORD}"
  }
}

maps = ["/app/config/maps/world.conf"]

render-threads = 4
update-threads = 2