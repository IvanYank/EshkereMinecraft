upstream backend {
    server yea_backend:8000;
}

upstream frontend {
    server yea_frontend:3000;
}

server {
    listen 80;
    server_name cubethrone.fun www.cubethrone.fun;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name cubethrone.fun www.cubethrone.fun;

    ssl_certificate /etc/letsencrypt/live/cubethrone.fun/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cubethrone.fun/privkey.pem;

    client_max_body_size 20M;


    location /map/ {
        proxy_pass http://yea_bluemap:80;  # <-- УБРАТЬ СЛЕШ В КОНЦЕ
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        
        proxy_buffering off;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location /admin/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /swagger/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /redoc/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /swagger.json {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /swagger.yaml {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /static/ {
        alias /app/static/;
    }

    location /media/ {
        alias /app/media/;
    }

    location /installer/ {
        alias /app/installer/;
        autoindex off;
        add_header Accept-Ranges bytes;
        sendfile on;
        tcp_nopush on;
    }

    location /api/ {
        if ($http_referer !~* "^https://(cubethrone\.fun|www\.cubethrone\.fun)") {
            return 403;
        }

        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
    }



    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
    }

    location ~* \.(webp|svg|js|css|map)$ {
        proxy_pass http://frontend;
        proxy_set_header Host $host;

        if ($request_uri ~* "main\.js|favicon\.webp") {
            add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
            break;
        }

        expires 365d;
        add_header Cache-Control "public, no-transform, immutable";

        access_log off;
    }
}
