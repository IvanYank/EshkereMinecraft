# Основная конфигурация
webserver: {
  ip: "0.0.0.0"
  port: 8100
  cors: true
}

webapp: {
  title: "BlueMap"
  webroot: "/app/web"
}

render: {
  auto-render: true
  threads: 2
}

# Подключение к MySQL
database: {
  type: "mysql"
  # Используем конфигурацию из sql.conf
  storage: "sql"
}

maps: {
  root: "/app/data/maps"
}

logging: {
  level: "INFO"
  file: "/app/data/logs/bluemap.log"
}