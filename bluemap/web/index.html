cat > ~/yea_project/bluemap/web/index.html << 'EOF'
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Карта сервера</title>
    <style>
        body { margin: 0; background: #0d1117; display: flex; justify-content: center; align-items: center; height: 100vh; flex-direction: column; font-family: Arial, sans-serif; }
        img { max-width: 100%; max-height: 90vh; object-fit: contain; border-radius: 4px; }
        .info { color: #888; margin-top: 10px; font-size: 14px; }
        .error { color: #ff6b6b; }
    </style>
</head>
<body>
    <img id="mapImg" src="/map/maps/world/tiles/1/x0z0.png" alt="Карта" onerror="showError()">
    <div class="info" id="status">🟢 Загрузка...</div>

    <script>
        document.getElementById('mapImg').onload = function() {
            document.getElementById('status').innerHTML = '✅ Карта загружена';
        };

        function showError() {
            document.getElementById('mapImg').style.display = 'none';
            document.getElementById('status').innerHTML = '❌ Тайл не найден. Проверь подключение к БД.';
        }
    </script>
</body>
</html>
EOF
