upstream backend {
    server yea_backend:8000;
}

upstream frontend {
    server yea_frontend:3000;
}

server {
    listen 80;
    server_name cubethrone.fun www.cubethrone.fun;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name cubethrone.fun www.cubethrone.fun;

    ssl_certificate /etc/letsencrypt/live/cubethrone.fun/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cubethrone.fun/privkey.pem;

    client_max_body_size 20M;

    location /admin/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /swagger/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /redoc/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /swagger.json {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /swagger.yaml {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /static/ {
        alias /app/static/;
    }

    location /media/ {
        alias /app/media/;
    }

    location /installer/ {
        alias /app/installer/;
        autoindex off;
        add_header Accept-Ranges bytes;
        sendfile on;
        tcp_nopush on;
    }

    location /api/ {
        if ($http_referer !~* "^https://(cubethrone\.fun|www\.cubethrone\.fun)") {
            return 403;
        }

        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
    }

    # 1. АССЕТЫ: Отдаем JS, CSS, шрифты и картинки напрямую с диска
    location /maps/assets/ {
        alias /var/www/bluemap/assets/;
        
        # Включаем определение MIME-типов по расширению файла
        include /etc/nginx/mime.types;
        default_type application/octet-stream;

        # Кэширование
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # 2. КОРНЕВЫЕ ФАЙЛЫ: index.html и settings.json тоже с диска
    location /maps/index.html {
        alias /var/www/bluemap/index.html;
        include /etc/nginx/mime.types;
        default_type text/html;
    }

    location /maps/settings.json {
        alias /var/www/bluemap/settings.json;
        include /etc/nginx/mime.types;
        default_type application/json;
    }
    
    # Локализация (если нужна)
    location /maps/lang/ {
        alias /var/www/bluemap/lang/;
        include /etc/nginx/mime.types;
        expires 7d;
    }

    # 3. ТАЙЛЫ КАРТЫ: Всё остальное отправляем в PHP (Bluemaps SQL)
    location /maps/ {
        fastcgi_pass yea_bluemap:9000;
        fastcgi_param SCRIPT_FILENAME /var/www/bluemap/sql.php;
        fastcgi_param SCRIPT_NAME /maps/sql.php;
        fastcgi_param REQUEST_URI $request_uri;
        fastcgi_param DOCUMENT_ROOT /var/www/bluemap;
        fastcgi_param HTTPS on;
        include fastcgi_params;
    }


    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
    }


}
