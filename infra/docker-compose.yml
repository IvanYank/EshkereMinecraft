services:
  db:
    image: postgres:16-alpine
    container_name: yea_db
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    env_file:
      - ./.env
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - yea_network

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: yea_backend
    volumes:
      - static_volume:/app/static
      - media_volume:/app/media
    env_file:
      - ./.env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - yea_network
    command: >
      sh -c "
      while ! pg_isready -h db -p 5432 -U ${POSTGRES_USER}; do sleep 1; done &&
      python manage.py migrate --noinput &&
      python manage.py collectstatic --noinput &&
      gunicorn --bind 0.0.0.0:8000 yea_project.wsgi:application
      "

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: yea_frontend
    volumes:
      - ../frontend/src:/app/src
      - ../frontend/public:/app/public
      - /app/node_modules
    environment:
      - NODE_ENV=development
    networks:
      - yea_network

  bluemap:
    image: ghcr.io/bluemap-minecraft/bluemap:v5.16  # Используем стабильную версию
    container_name: yea_bluemap
    restart: unless-stopped
    command: -r -u -w  # render, update, webserver
    ports:
      - "8100:8100"  # Порт для веб-интерфейса BlueMap
    volumes:
      - ./bluemap/config:/app/config  # Конфигурация
      - ./bluemap/data:/app/data      # Данные
      - ./bluemap/web:/app/web        # Веб-файлы
      # - ./worlds/overworld:/app/world  # Если мир локальный, раскомментировать
    env_file:
      - ./.env
    environment:
      - BLUEMAP_DB_HOST=${BLUEMAP_DB_HOST:-db}
      - BLUEMAP_DB_PORT=${BLUEMAP_DB_PORT:-5432}
      - BLUEMAP_DB_USER=${BLUEMAP_DB_USER:-${POSTGRES_USER}}
      - BLUEMAP_DB_NAME=${BLUEMAP_DB_NAME:-${POSTGRES_DB}}
      - BLUEMAP_DB_PASSWORD=${BLUEMAP_DB_PASSWORD:-${POSTGRES_PASSWORD}}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - yea_network
  gateway:
    build:
      context: ../gateway
      dockerfile: Dockerfile
    container_name: yea_gateway
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - static_volume:/app/static
      - media_volume:/app/media
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /opt/data:/app/installer:ro
    depends_on:
      - backend
      - frontend
    networks:
      - yea_network
    environment:
      - BLUEMAP_URL=http://bluemap:8100

volumes:
  postgres_data:
  static_volume:
  media_volume:

networks:
  yea_network:
    driver: bridge
