# Настройки веб-сервера
webserver {
  port = 8100
  address = "0.0.0.0"
  webroot = "/app/web"
  max-connections = 100
}

# Настройки webapp
webapp {
  # Разрешить скачивание ресурсов
  download-resources = true
  # Путь к ресурсам
  resource-path = "/app/web"
  # Использовать сжатие
  enable-gzip = true
}

# Настройки базы данных
database {
  type = "sql"
  sql {
    driver = "org.postgresql.Driver"
    url = "jdbc:postgresql://${BLUEMAP_DB_HOST}:${BLUEMAP_DB_PORT}/${BLUEMAP_DB_NAME}"
    username = "${BLUEMAP_DB_USER}"
    password = "${BLUEMAP_DB_PASSWORD}"
    
    # Настройки пула соединений
    pool {
      max-size = 10
      min-idle = 2
      max-idle-time = 300000
    }
  }
}

# Карты для рендеринга
maps = ["/app/config/maps/world.conf"]

# Настройки рендеринга
render-threads = 4
update-threads = 2

# Настройки логов
logging {
  level = "INFO"
  # Можно добавить для отладки
  # level = "DEBUG"
}