cat > ../bluemap/config/webserver.conf << 'EOF'
webserver {
  host = "0.0.0.0"
  port = 8100
  webroot = "/app/web"
  
  # CORS настройки для вашего домена
  cors {
    allowed-origins = ["https://cubethrone.fun", "https://www.cubethrone.fun"]
    allowed-methods = ["GET", "HEAD", "OPTIONS"]
    allowed-headers = ["*"]
  }
  
  # Сжатие
  compression {
    enabled = true
    level = 6
  }
  
  # Кэширование
  caching {
    enabled = true
    max-age = 3600
  }
  
  # Лимиты
  max-connections = 100
  max-request-size = 10MB
}
EOF