# ============================================
# BlueMap - Конфигурация карты "world"
# ============================================

# Путь к папке с сохранениями мира
# Если закомментировать - карта будет только в веб-интерфейсе без рендеринга
world: "world"

# Измерение мира
dimension: "minecraft:overworld"

# Отображаемое имя на карте
name: "Мир"

# Порядок сортировки в меню (меньше = выше)
sorting: 0

# Начальная позиция при открытии карты
start-pos: { x: 0, z: 0 }

# Цвет неба
sky-color: "#7dabff"

# Цвет пустоты
void-color: "#000000"

# Яркость неба (0-1)
sky-light: 1

# Дополнительная подсветка блоков (0-1)
ambient-light: 0.1

# Удаление пещер ниже этого Y уровня (для производительности)
# 55 - стандарт, -10000 - отключить удаление
remove-caves-below-y: 55

# Относительно дна океана для определения пещер
cave-detection-ocean-floor: -5

# Использовать ли блок-лайт для определения пещер
cave-detection-uses-block-light: false

# Минимальное inhabitedTime для рендера чанков (0 = все)
min-inhabited-time: 0

# Маска рендеринга (ограничение области)
render-mask: [
  {
    type: box
    subtract: false
    # Ограничиваем область рендера (опционально)
    # Уберите или увеличьте значения, если хотите рендерить весь мир
    min-x: -3000
    max-x: 3000
    min-z: -3000
    max-z: 3000
    min-y: 50
    max-y: 320
  }
]

# Отображать края мира (если есть маска)
render-edges: true

# Яркость на краях (0-15)
edge-light-strength: 8

# Включить перспективный вид (3D)
enable-perspective-view: true

# Включить изометрический вид (сверху)
enable-flat-view: true

# Включить свободный полет
enable-free-flight-view: true

# Включить высокое разрешение (hires)
enable-hires: true

# Используемое хранилище (SQL)
storage: "sql"

# Игнорировать отсутствие световых данных
ignore-missing-light-data: false

# Маркеры (пусто)
marker-sets: {
  # Здесь можно добавить маркеры позже
}