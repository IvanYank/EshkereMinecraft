# Конфигурация для BlueMap
location /bluemap/ {
    proxy_pass http://yea_bluemap:8100/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    
    # Для WebSocket поддержки (если нужна)
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    
    # Таймауты для долгих запросов
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
}

# Если нужно раздавать статику BlueMap напрямую
location /bluemap-assets/ {
    alias /opt/EshkereMinecraft/bluemap/assets/;
    expires 1y;
    add_header Cache-Control "public, immutable";
}