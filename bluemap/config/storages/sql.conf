storage-type: sql
connection-url: "jdbc:mariadb://${env.BLUEMAP_DB_HOST}:${env.BLUEMAP_DB_PORT}/${env.BLUEMAP_DB_NAME}"

connection-properties: {
    user: "${env.BLUEMAP_DB_USER}",
    password: "${env.BLUEMAP_DB_PASSWORD}",
    useSSL: "false"
}

pool-size: 10
connection-timeout: 30000
compression: gzip