# bluemap/storages/sql.conf
storage {
    # Используем SQL хранилище
    class = "de.bluecolored.bluemap.core.storage.sql.SqlStorage"
    config {
        # Основные настройки подключения к БД
        connection {
            # Тип базы данных (mysql/mariadb/postgresql)
            type = "mysql"
            
            # Используем переменные окружения для подключения
            host = ${BLUEMAP_DB_HOST}
            port = ${BLUEMAP_DB_PORT}
            database = ${BLUEMAP_DB_NAME}
            username = ${BLUEMAP_DB_USER}
            password = ${BLUEMAP_DB_PASSWORD}
            
            # Дополнительные параметры (опционально)
            # useSSL = false
            # serverTimezone = UTC
        }
        
        # Настройка пула соединений (опционально)
        pool {
            maxSize = 10
            minIdle = 2
            maxLifetime = 1800000  # 30 минут в миллисекундах
        }
        
        # Настройка таблиц (опционально)
        tables {
            prefix = "bluemap_"
        }
    }
}