# Настройка MySQL хранилища
storage: "sql"
  connection: {
    # Для MySQL используем jdbc:mysql
    url: "jdbc:mysql://${BLUEMAP_DB_HOST}:${BLUEMAP_DB_PORT}/${BLUEMAP_DB_NAME}"
    username: "${BLUEMAP_DB_USER}"
    password: "${BLUEMAP_DB_PASSWORD}"
    # Дополнительные параметры для MySQL
    properties: {
      useSSL: "false"
      allowPublicKeyRetrieval: "true"
      serverTimezone: "UTC"
      characterEncoding: "UTF-8"
    }
  }