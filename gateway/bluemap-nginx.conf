server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html index.php;

    # Статические файлы отдаем напрямую
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Все запросы к /maps/ перенаправляем на sql.php
    location /maps/ {
        try_files $uri $uri/ /sql.php?$query_string;
    }

    # PHP скрипты выполняем через PHP-FPM
    location ~ \.php$ {
        fastcgi_pass bluemap_php:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param BLUEMAP_DB_HOST $BLUEMAP_DB_HOST;
        fastcgi_param BLUEMAP_DB_PORT $BLUEMAP_DB_PORT;
        fastcgi_param BLUEMAP_DB_NAME $BLUEMAP_DB_NAME;
        fastcgi_param BLUEMAP_DB_USER $BLUEMAP_DB_USER;
        fastcgi_param BLUEMAP_DB_PASSWORD $BLUEMAP_DB_PASSWORD;
        include fastcgi_params;
    }

    # Корневой URL отдаем index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}