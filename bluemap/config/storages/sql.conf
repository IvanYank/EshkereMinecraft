storage-type: sql
connection-url: "jdbc:postgresql://${BLUEMAP_DB_HOST}:${BLUEMAP_DB_PORT}/${BLUEMAP_DB_NAME}"
connection-properties: {
  user: "${BLUEMAP_DB_USER}",
  password: "${BLUEMAP_DB_PASSWORD}"
}
max-connections: 10
compression: gzip