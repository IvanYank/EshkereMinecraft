worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;

    server {
        listen 80;
        server_name localhost;

        # Корневая папка с файлами BlueMap
        root /var/www/bluemap;
        index index.html;

        # Логирование в stdout/stderr для Docker
        access_log /dev/stdout;
        error_log /dev/stderr;

        # Обработка статических файлов и PHP
        location / {
            try_files $uri $uri/ /sql.php?$query_string;
        }

        # Передача запросов PHP в php-fpm
        location ~ \.php$ {
            fastcgi_pass 127.0.0.1:9000;
            fastcgi_index sql.php;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            include fastcgi_params;
        }
    }
}