sql-storage {
    type = "mysql"
    host = "${BLUEMAP_DB_HOST}"
    port = ${BLUEMAP_DB_PORT}
    database = "${BLUEMAP_DB_NAME}"
    username = "${BLUEMAP_DB_USER}"
    password = "${BLUEMAP_DB_PASSWORD}"
    
    connection-properties {
        useSSL = "true"
        serverTimezone = "UTC"
    }
    
    # Куда сохранять сгенерированные карты
    map-storage = "/app/web/maps"
    
    # Путь к миру Minecraft
    root = "/app/world"
}