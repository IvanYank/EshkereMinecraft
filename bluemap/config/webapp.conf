cat > /opt/EshkereMinecraft/bluemap/config/webapp.conf << 'EOF'
webapp {
    # Заголовок страницы
    title: "Cubethrone Map"
    
    # Путь к веб-файлам
    webroot: "/app/web"
    
    # Отключаем встроенную аутентификацию
    authentication: false
    
    # Разрешаем CORS для API
    cors: true
    
    # Локализация по умолчанию
    locale: "en"
}
EOF