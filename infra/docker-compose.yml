services:
  db:
    image: postgres:16-alpine
    container_name: yea_db
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    env_file:
      - ./.env
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - yea_network

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: yea_backend
    volumes:
      - static_volume:/app/static
      - media_volume:/app/media
    env_file:
      - ./.env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - yea_network
    command: >
      sh -c "
      while ! pg_isready -h db -p 5432 -U ${POSTGRES_USER}; do sleep 1; done &&
      python manage.py migrate --noinput &&
      python manage.py collectstatic --noinput &&
      gunicorn --bind 0.0.0.0:8000 yea_project.wsgi:application
      "

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: yea_frontend
    volumes:
      - ../frontend/src:/app/src
      - ../frontend/public:/app/public
      - /app/node_modules
    environment:
      - NODE_ENV=development
    networks:
      - yea_network

# infra/docker-compose.yml
  bluemap_render:
    image: ghcr.io/bluemap-minecraft/bluemap:v5.4
    container_name: yea_bluemap_render
    restart: "no"
    command: -r
    volumes:
      - ../bluemap/config:/app/config
      - ../bluemap/data:/app/data
      - ../bluemap/world:/app/world:ro
    environment:
      - BLUEMAP_DB_HOST=${BLUEMAP_DB_HOST:-db}
      - BLUEMAP_DB_PORT=${BLUEMAP_DB_PORT:-5432}
      - BLUEMAP_DB_NAME=${BLUEMAP_DB_NAME}
      - BLUEMAP_DB_USER=${BLUEMAP_DB_USER}
      - BLUEMAP_DB_PASSWORD=${BLUEMAP_DB_PASSWORD}
    networks:
      - yea_network
    depends_on:
      db:
        condition: service_healthy

  # Веб-сервер Nginx для PHP-проекта
  bluemap_web:
    image: nginx:alpine
    container_name: yea_bluemap_web
    restart: unless-stopped
    volumes:
      - ../bluemap/web:/usr/share/nginx/html
      - ../gateway/bluemap-nginx.conf:/etc/nginx/conf.d/default.conf:ro  # <-- ПУТЬ К gateway
    networks:
      - yea_network
    depends_on:
      - bluemap_php

  # PHP-FPM для выполнения скриптов
  bluemap_php:
    image: php:8.2-fpm-alpine
    container_name: yea_bluemap_php
    restart: unless-stopped
    volumes:
      - ../bluemap/web:/usr/share/nginx/html
    environment:
      - BLUEMAP_DB_HOST=${BLUEMAP_DB_HOST:-db}
      - BLUEMAP_DB_PORT=${BLUEMAP_DB_PORT:-5432}
      - BLUEMAP_DB_NAME=${BLUEMAP_DB_NAME}
      - BLUEMAP_DB_USER=${BLUEMAP_DB_USER}
      - BLUEMAP_DB_PASSWORD=${BLUEMAP_DB_PASSWORD}
    networks:
      - yea_network

  gateway:
    build:
      context: ../gateway
      dockerfile: Dockerfile
    container_name: yea_gateway
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - static_volume:/app/static
      - media_volume:/app/media
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /opt/data:/app/installer:ro
      - ../bluemap/web:/var/www/bluemap:ro
    depends_on:
      - backend
      - frontend
    networks:
      - yea_network

volumes:
  postgres_data:
  postgres_map_data:
  static_volume:
  media_volume:

networks:
  yea_network:
    driver: bridge
