upstream backend {
    server yea_backend:8000;
}

upstream frontend {
    server yea_frontend:3000;
}

server {
    listen 80;
    server_name cubethrone.fun www.cubethrone.fun;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name cubethrone.fun www.cubethrone.fun;

    ssl_certificate /etc/letsencrypt/live/cubethrone.fun/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cubethrone.fun/privkey.pem;

    client_max_body_size 20M;

    location /admin/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /swagger/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /redoc/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /swagger.json {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /swagger.yaml {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /static/ {
        alias /app/static/;
    }

    location /media/ {
        alias /app/media/;
    }

    location /installer/ {
        alias /app/installer/;
        autoindex off;
        add_header Accept-Ranges bytes;
        sendfile on;
        tcp_nopush on;
    }

    location /api/ {
        if ($http_referer !~* "^https://(cubethrone\.fun|www\.cubethrone\.fun)") {
            return 403;
        }

        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
    }

    # 1. Явно отдаем ассеты (JS, CSS, картинки) с диска
    location /maps/assets/ {
        alias /var/www/bluemap/assets/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # 2. Отдаем index.html и настройки с диска
    location = /maps/index.html {
        alias /var/www/bluemap/index.html;
    }
    
    location = /maps/settings.json {
        alias /var/www/bluemap/settings.json;
    }

    # 3. Всё остальное (тайлы карты, маркеры) отправляем в PHP
    location /maps/ {
        fastcgi_pass yea_bluemap:9000;
        fastcgi_param SCRIPT_FILENAME /var/www/bluemap/sql.php;
        fastcgi_param SCRIPT_NAME /maps/sql.php;
        fastcgi_param REQUEST_URI $request_uri;
        fastcgi_param DOCUMENT_ROOT /var/www/bluemap;
        fastcgi_param HTTPS on;
        include fastcgi_params;
    }

    # Убираем try_files и @bluemap_fallback, они больше не нужны для этой логики


    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
    }


}
